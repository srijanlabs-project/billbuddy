    <text x="1082" y="270">Subtotal</text><text x="1320" y="270">7700</text>
    <text x="1082" y="302">GST</text><text x="1320" y="302">1386</text>
    <text x="1082" y="334">Discount</text><text x="1320" y="334">500</text>
    <text x="1082" y="366">Advance</text><text x="1320" y="366">2000</text>
  </g>
  <rect x="1082" y="390" width="288" height="54" rx="9" fill="#e8f2ff" stroke="#c6dcff"/>
