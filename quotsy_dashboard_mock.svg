<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6f8fc"/>
      <stop offset="100%" stop-color="#eef3fb"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #1f2a44; }
      .h2 { font: 700 21px Arial, sans-serif; fill: #1f2a44; }
      .h3 { font: 700 16px Arial, sans-serif; fill: #1f2a44; }
      .body { font: 500 14px Arial, sans-serif; fill: #40506b; }
      .small { font: 500 12px Arial, sans-serif; fill: #6d7d99; }
      .btn { font: 700 14px Arial, sans-serif; fill: white; }
      .chip { font: 700 13px Arial, sans-serif; fill: #2f4f86; }
    </style>
  </defs>

  <rect width="1440" height="900" fill="url(#bg)"/>

  <rect x="0" y="0" width="240" height="900" rx="0" fill="#102c4f"/>
  <text x="34" y="52" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">Quotsy</text>
  <g fill="#d2e4ff" font-family="Arial, sans-serif" font-size="16">
    <text x="34" y="120">Dashboard</text>
    <text x="34" y="162">Quotations</text>
    <text x="34" y="204">Customers</text>
    <text x="34" y="246">Orders</text>
    <text x="34" y="288">Configuration Studio</text>
    <text x="34" y="330">Settings</text>
  </g>

  <rect x="260" y="24" width="1156" height="64" rx="12" fill="#ffffff" stroke="#d9e2f2"/>
  <rect x="286" y="40" width="520" height="32" rx="8" fill="#f3f6fc" stroke="#d7e1f2"/>
  <text x="304" y="61" class="small">Search quotation / customer</text>
  <circle cx="1270" cy="56" r="11" fill="#f0f5ff" stroke="#c9d8f3"/>
  <circle cx="1340" cy="56" r="16" fill="#d8e7ff" stroke="#b7cff5"/>
  <text x="1365" y="61" class="chip">Sai Laser Tech</text>

  <text x="260" y="132" class="title">Quotation Preview Workspace</text>

  <rect x="260" y="152" width="1156" height="408" rx="12" fill="#ffffff" stroke="#d8e2f2" filter="url(#cardShadow)"/>
  <text x="286" y="188" class="h2">Quotation #QTN-2026-0412 (V2)</text>

  <rect x="286" y="204" width="760" height="82" rx="10" fill="#f7faff" stroke="#dbe6f7"/>
  <text x="306" y="228" class="h3">Customer Details</text>
  <text x="306" y="250" class="body">Name: Ramesh Patel | Mobile: 9987654321</text>
  <text x="306" y="270" class="body">Address: Sector 10, Kharghar, Navi Mumbai</text>

  <rect x="286" y="300" width="760" height="238" rx="10" fill="#ffffff" stroke="#dbe6f7"/>
  <rect x="286" y="300" width="760" height="36" rx="10" fill="#eef4ff"/>
  <text x="306" y="323" class="small">Material</text>
  <text x="586" y="323" class="small">Qty</text>
  <text x="656" y="323" class="small">Unit Rate</text>
  <text x="776" y="323" class="small">Total Area</text>
  <text x="916" y="323" class="small">Amount</text>
  <g class="body">
    <text x="306" y="356">Acrylic Board 3mm</text><text x="586" y="356">2</text><text x="656" y="356">1500</text><text x="776" y="356">24 sqft</text><text x="916" y="356">3000</text>
    <text x="306" y="390">Transport</text><text x="586" y="390">1</text><text x="656" y="390">1500</text><text x="776" y="390">-</text><text x="916" y="390">1500</text>
    <text x="306" y="424">Design Work</text><text x="586" y="424">1</text><text x="656" y="424">1200</text><text x="776" y="424">-</text><text x="916" y="424">1200</text>
    <text x="306" y="458">Installation</text><text x="586" y="458">1</text><text x="656" y="458">2000</text><text x="776" y="458">-</text><text x="916" y="458">2000</text>
  </g>

  <rect x="1062" y="204" width="328" height="334" rx="10" fill="#f8fbff" stroke="#dbe6f7"/>
