  <rect x="260" y="578" width="820" height="210" rx="12" fill="#ffffff" stroke="#d8e2f2" filter="url(#cardShadow)"/>
  <rect x="286" y="604" width="378" height="158" rx="10" fill="#f9fbff" stroke="#dbe6f7"/>
  <text x="306" y="630" class="h3">Terms &amp; Conditions</text>
  <g class="body">
    <text x="306" y="655">• Valid for 7 days from issue date</text>
    <text x="306" y="678">• 50% advance with order confirmation</text>
    <text x="306" y="701">• Balance before dispatch/delivery</text>
  </g>
  <rect x="680" y="604" width="374" height="158" rx="10" fill="#f9fbff" stroke="#dbe6f7"/>
  <text x="700" y="630" class="h3">Notes</text>
  <g class="body">
    <text x="700" y="655">• Scope limited to listed items only</text>
    <text x="700" y="678">• Timeline may vary by site conditions</text>
    <text x="700" y="701">• Order once confirmed cannot be cancelled</text>
  </g>

  <rect x="1100" y="602" width="290" height="186" rx="10" fill="#ffffff" stroke="#d8e2f2" filter="url(#cardShadow)"/>
  <text x="1165" y="650" class="h3">For SAI LASER TECH</text>
  <text x="1175" y="700" class="small">Authorised Signatory</text>

  <rect x="260" y="804" width="1156" height="54" rx="12" fill="#ffffff" stroke="#d8e2f2"/>
  <rect x="286" y="816" width="132" height="30" rx="8" fill="#3f6ec8"/><text x="307" y="836" class="btn">Preview PDF</text>
  <rect x="430" y="816" width="142" height="30" rx="8" fill="#274f99"/><text x="454" y="836" class="btn">Download PDF</text>
  <rect x="1256" y="816" width="128" height="30" rx="8" fill="#0f6a3f"/><text x="1298" y="836" class="btn">Submit</text>

  <rect x="240" y="862" width="1180" height="38" rx="8" fill="#0f2f54"/>
  <text x="284" y="886" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ffd83b">UPGRADE YOUR QUOTATION WORKFLOW</text>
  <text x="684" y="886" font-family="Arial, sans-serif" font-size="16" fill="#62b7ff">SMART QUOTATION, FASTER DEALS</text>
  <rect x="1230" y="868" width="160" height="26" rx="10" fill="#ffe228"/>
  <text x="1268" y="886" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#1f2a44">Check it now</text>
</svg>
