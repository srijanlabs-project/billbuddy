<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Mulish:wght@800&amp;display=swap');
    </style>
  </defs>

  <!-- Icon mark: 64x64 violet square -->
  <rect x="0" y="8" width="64" height="64" rx="14" fill="#6C5CE7"/>

  <!-- Line item rows: left bars -->
  <rect x="11" y="22" width="27" height="5" rx="2.5" fill="white" opacity="0.95"/>
  <rect x="11" y="33" width="21" height="5" rx="2.5" fill="white" opacity="0.70"/>
  <rect x="11" y="44" width="24" height="5" rx="2.5" fill="white" opacity="0.70"/>

  <!-- Line item rows: right value bars -->
  <rect x="44" y="22" width="11" height="5" rx="2.5" fill="white" opacity="0.95"/>
  <rect x="44" y="33" width="11" height="5" rx="2.5" fill="white" opacity="0.70"/>
  <rect x="44" y="44" width="11" height="5" rx="2.5" fill="white" opacity="0.70"/>

  <!-- Total divider line -->
  <rect x="9" y="53" width="48" height="1.2" rx="0.6" fill="white" opacity="0.30"/>

  <!-- Checkmark as total line (teal) -->
  <polyline points="11,61 19,69 57,51"
    fill="none" stroke="#00D4A8" stroke-width="5"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark -->
  <text x="80" y="58"
    font-family="Mulish, sans-serif"
    font-weight="800"
    font-size="48"
    letter-spacing="-1.5"
    fill="#1A1040">Quotsy</text>
</svg>
