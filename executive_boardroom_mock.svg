      .muted { fill:#667085; font-family: 'Segoe UI', Arial, sans-serif; }
      .light { fill:#98a2b3; font-family: 'Segoe UI', Arial, sans-serif; }
      .rule { stroke:#d6d9df; stroke-width:2; }
      .heavy { stroke:#111827; stroke-width:3; }
      .title { font-size:58px; font-weight:700; letter-spacing:1px; }
